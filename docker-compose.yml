services:
  mongodb:
    container_name: village-connecte-mongo
    image: mongo:7
    command: ["--bind_ip_all"]
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE:-village_connecte}
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--username", "${MONGO_INITDB_ROOT_USERNAME}", "--password", "${MONGO_INITDB_ROOT_PASSWORD}", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network
      
  api:
    container_name: village-connecte-api
    build: .
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-5000}
      - MONGO_URI=${MONGO_URI}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"
      # HTTPS router
      - "traefik.http.routers.village-connecte-api.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.village-connecte-api.entrypoints=websecure"
      - "traefik.http.routers.village-connecte-api.tls.certresolver=letsencrypt"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.village-connecte-api-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.village-connecte-api-http.entrypoints=web"
      - "traefik.http.routers.village-connecte-api-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
      # Service
      - "traefik.http.services.village-connecte-api.loadbalancer.server.port=5000"
    networks:
      - app-network
      - traefik-network

  

volumes:
  mongo_data:

networks:
  app-network:
    driver: bridge
  traefik-network:
    external: true
